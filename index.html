<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>티니핑 길드 DB</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
}

.login-screen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.login-box{
    width:320px;
    background:#1f2937;
    padding:30px;
    border-radius:16px;
    text-align:center;
}

.login-box h1{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.layout{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:#1f2937;
    padding:20px;
}

.sidebar h1{
    margin-bottom:10px;
}

.sidebar p{
    color:#9ca3af;
    margin-bottom:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#374151;
    color:white;
    cursor:pointer;
}

.main{
    flex:1;
    padding:30px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

.admin-only{
    display:none;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

textarea{
    min-height:120px;
}

.save-btn{
    margin-top:10px;
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- 로그인 -->

<div id="loginScreen" class="login-screen">

    <div class="login-box">

        <h1>🎀 티니핑 길드 DB</h1>

        <input
            type="text"
            id="loginId"
            placeholder="아이디 입력"
        />

        <input
            type="password"
            id="loginCode"
            placeholder="비밀번호 입력"
        />

        <button onclick="login()">
            접속하기
        </button>

        <p
            id="loginMessage"
            style="margin-top:10px;color:#f87171;"
        ></p>

    </div>

</div>


<div class="layout">

    <!-- 사이드바 -->

    <aside class="sidebar">

        <h1>티니핑 길드 DB</h1>

        <p id="roleName">
            👤 길드원
        </p>

        <div class="menu">

            <button>🏠 홈</button>

            <button>📢 공지</button>

            <button>⚔ 덱 정보</button>

            <button>📊 랭킹</button>

            <button
                class="admin-only"
                onclick="showMemberTab()"
            >
                🔐 인원관리
            </button>

            <button onclick="logout()">
                🚪 로그아웃
            </button>

        </div>

    </aside>


    <!-- 메인 -->

    <main class="main">

        <div class="card">

            <h2>📢 공지사항</h2>

            <p>
                오늘 저녁 9시 길드전 진행 예정입니다.
            </p>

        </div>


        <div class="card">

            <h2>⚔ 추천 덱</h2>

            <p>
                불속성 조합 + 회복형 지원 추천
            </p>

        </div>


        <!-- 관리자 전용 -->

        <div class="card admin-only">

            <h2>👑 관리자 전용 수정창</h2>

            <input
                type="text"
                placeholder="공지 제목"
            />

            <textarea
                placeholder="공지 내용을 입력하세요"
            ></textarea>

            <button class="save-btn">
                저장하기
            </button>

        </div>


        <!-- 인원관리 -->

        <div
            id="memberManageTab"
            class="card admin-only"
            style="display:none;"
        >

            <h2>🔐 인원관리</h2>

            <p
                style="color:#9ca3af;margin-bottom:15px;"
            >
                관리자만 계정을 생성/삭제할 수 있습니다.
            </p>


            <input
                type="text"
                id="newUserId"
                placeholder="새 아이디"
            />

            <input
                type="password"
                id="newUserCode"
                placeholder="새 비밀번호"
            />


            <select id="newUserRole">

                <option value="member">
                    길드원
                </option>

                <option value="admin">
                    관리자
                </option>

            </select>


            <button
                class="save-btn"
                onclick="addUser()"
            >
                계정 생성
            </button>


            <h3 style="margin-top:25px;">
                현재 등록된 인원
            </h3>

            <div
                id="userList"
                style="margin-top:10px;"
            ></div>

        </div>

    </main>

</div>


<!-- Firebase -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut,
    createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// ======================
// Firebase 설정
// ======================

const firebaseConfig = {

    apiKey: "AIzaSyBxSY1hztrurOhRYnQH0jMJKJoW6ihjR_Y",

    authDomain: "tinyping-guild-db.firebaseapp.com",

    projectId: "tinyping-guild-db",

    storageBucket: "tinyping-guild-db.firebasestorage.app",

    messagingSenderId: "204220841547",

    appId: "1:204220841547:web:3bb3088b49936d4f0457ce"

};


// ======================

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const secondaryApp = initializeApp(firebaseConfig, "Secondary");

const secondaryAuth = getAuth(secondaryApp);

// ======================

let currentUser = null;

let currentRole = "member";


// 관리자 목록

const adminAccounts = [
    "쏘지"
];


// ======================
// 로그인
// ======================

window.login = async function(){

    const id =
        document.getElementById("loginId")
        .value
        .trim();

    const code =
        document.getElementById("loginCode")
        .value
        .trim();

    const email = `${id}@tinyping.com`;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            code
        );

    }
    catch(error){

        document.getElementById("loginMessage")
        .innerText =
        "아이디 또는 비밀번호가 틀렸습니다.";

    }

};


// ======================
// 로그인 유지
// ======================

onAuthStateChanged(auth,(user)=>{

    if(user){

        const id =
            user.email.split("@")[0];

        currentUser = id;

        currentRole =
            adminAccounts.includes(id)
            ? "admin"
            : "member";

        document.getElementById(
            "loginScreen"
        ).style.display = "none";

        updateRoleUI();

    }
    else{

        document.getElementById(
            "loginScreen"
        ).style.display = "flex";

    }

});


// ======================
// 로그아웃
// ======================

window.logout = async function(){

    await signOut(auth);

    location.reload();

};


// ======================
// UI 업데이트
// ======================

function updateRoleUI(){

    const roleName =
        document.getElementById("roleName");

    roleName.innerText =
        currentRole === "admin"
        ? "👑 관리자"
        : "👤 길드원";


    const adminItems =
        document.querySelectorAll(".admin-only");

    adminItems.forEach(item=>{

        item.style.display =
            currentRole === "admin"
            ? "block"
            : "none";

    });


    renderUserList();

}


// ======================
// 인원관리 열기
// ======================

window.showMemberTab = function(){

    document.getElementById(
        "memberManageTab"
    ).style.display = "block";

};


// ======================
// 유저 저장
// ======================

let users = {

    "쏘지":{
        role:"admin"
    }

};


// ======================
// 계정 생성
// ======================

window.addUser = async function(){

    if(currentRole !== "admin"){

        alert("관리자만 가능합니다.");
        return;

    }

    const id =
        document.getElementById("newUserId")
        .value
        .trim();

    const password =
        document.getElementById("newUserCode")
        .value
        .trim();

    const role =
        document.getElementById("newUserRole")
        .value;

    if(!id || !password){

        alert("아이디와 비밀번호를 모두 입력해주세요.");
        return;

    }

    if(password.length < 6){

        alert("비밀번호는 6자리 이상이어야 합니다.");
        return;

    }

    if(users[id]){

        alert("이미 존재하는 계정입니다.");
        return;

    }

    const email = `${id}@tinyping.com`;

    try{

        await createUserWithEmailAndPassword(
            secondaryAuth,
            email,
            password
        );

        users[id] = {
            role: role
        };

        saveUsers();

        renderUserList();

        document.getElementById("newUserId").value = "";

        document.getElementById("newUserCode").value = "";

        alert("Firebase 계정 생성 완료!");

    }
    catch(error){

        console.log(error);

        if(error.code === "auth/email-already-in-use"){

            alert("이미 Firebase에 등록된 아이디입니다.");

        }
        else if(error.code === "auth/weak-password"){

            alert("비밀번호는 6자리 이상이어야 합니다.");

        }
        else{

            alert("계정 생성 중 오류가 발생했습니다.");

        }

    }

};

// ======================
// 계정 삭제
// ======================

window.deleteUser = function(id){

    if(id === currentUser){

        alert("현재 로그인 계정은 삭제 불가");
        return;

    }

    delete users[id];

    saveUsers();

    renderUserList();

};


// ======================
// 저장
// ======================

function saveUsers(){

    localStorage.setItem(
        "tinypingUsers",
        JSON.stringify(users)
    );

}


// ======================
// 불러오기
// ======================

function loadUsers(){

    const saved =
        localStorage.getItem(
            "tinypingUsers"
        );

    if(saved){

        users = JSON.parse(saved);

    }

}


// ======================
// 유저 목록 출력
// ======================

function renderUserList(){

    const userList =
        document.getElementById("userList");

    userList.innerHTML = "";

    Object.keys(users).forEach(id=>{

        const user = users[id];

        const row =
            document.createElement("div");

        row.style.cssText =
            "display:flex;justify-content:space-between;align-items:center;background:#374151;padding:12px;border-radius:10px;margin-bottom:8px;";

        row.innerHTML = `

            <div>

                <strong>${id}</strong><br>

                <span style="font-size:13px;color:#d1d5db;">

                    권한 :
                    ${user.role === "admin"
                        ? "관리자"
                        : "길드원"}

                </span>

            </div>

            <button
                onclick="deleteUser('${id}')"
                style="
                    background:#dc2626;
                    color:white;
                    border:none;
                    border-radius:8px;
                    padding:8px 10px;
                    cursor:pointer;
                "
            >
                삭제
            </button>

        `;

        userList.appendChild(row);

    });

}


// ======================

loadUsers();

</script>

</body>
</html>
