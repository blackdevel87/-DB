<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>티니핑 길드 DB</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
}

.login-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    width: 320px;
    background: #1f2937;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
}

.login-box h1 {
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-radius: 8px;
}

.login-box button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.layout {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 250px;
    background: #1f2937;
    padding: 20px;
}

.sidebar h1 {
    margin-bottom: 10px;
}

.sidebar p {
    color: #9ca3af;
    margin-bottom: 20px;
}

.menu button {
    width: 100%;
    margin-bottom: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #374151;
    color: white;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 30px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
}

.admin-only {
    display: none;
}

.admin-mode .admin-only {
    display: block;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

textarea {
    min-height: 120px;
}

.save-btn {
    margin-top: 10px;
    background: #dc2626;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 로그인 화면 -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1>🎀 티니핑 길드 DB</h1>

        <input type="text" id="loginId" placeholder="아이디 입력" />
        <input type="password" id="loginCode" placeholder="코드 입력" />

        <button onclick="login()">접속하기</button>

        <p id="loginMessage" style="margin-top:10px;color:#f87171;"></p>
    </div>
</div>

<div class="layout">

    <aside class="sidebar">
        <h1>티니핑 길드 DB</h1>
        <p id="roleName">👤 길드원</p>

        <div class="menu">
            <button>🏠 홈</button>
            <button>📢 공지</button>
            <button>⚔ 덱 정보</button>
            <button>📊 랭킹</button>
        </div>
    </aside>

    <main class="main">

        <div class="card">
            <h2>📢 공지사항</h2>
            <p>
                오늘 저녁 9시 길드전 진행 예정입니다.
            </p>
        </div>

        <div class="card">
            <h2>⚔ 추천 덱</h2>
            <p>
                불속성 조합 + 회복형 지원 추천.
            </p>
        </div>

        <!-- 관리자 전용 -->
        <div class="card admin-only">
            <h2>👑 관리자 전용 수정창</h2>

            <input type="text" placeholder="공지 제목" />

            <textarea placeholder="공지 내용을 입력하세요"></textarea>

            <button class="save-btn">
                저장하기
            </button>
        </div>

    </main>

</div>

<script>

const users = {
    "쏘지": {
        code: "1234",
        role: "admin"
    },

    "길드원1": {
        code: "1111",
        role: "member"
    },

    "길드원2": {
        code: "2222",
        role: "member"
    }
};

let currentUser = null;
let currentRole = "member";

function login() {

    const id = document.getElementById("loginId").value.trim();
    const code = document.getElementById("loginCode").value.trim();

    const user = users[id];

    if (!user || user.code !== code) {
        document.getElementById("loginMessage").innerText =
            "아이디 또는 코드가 틀렸습니다.";
        return;
    }

    currentUser = id;
    currentRole = user.role;

    document.getElementById("loginScreen").style.display = "none";

    if (currentRole === "admin") {
        document.body.classList.add("admin-mode");
    }

    updateRoleUI();
}

function updateRoleUI() {

    const roleName = document.getElementById("roleName");

    if (roleName) {
        roleName.innerText =
            currentRole === "admin"
                ? "👑 관리자"
                : "👤 길드원";
    }
}

updateRoleUI();

</script>

</body>
</html>
